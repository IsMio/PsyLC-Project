# Copy this file to data/config.yaml and fill in local secrets.
dashscope:
  assist_api_base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  assist_api_key: "your_assist_api_key"
  api_base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  api_key: "your_dashscope_api_key"
  model_name: "qwen-plus"
  model_max_tokens: 20000
  embeddings_model_name: "text-embedding-v1"

model:
  temperature: 0.1
  top_p: 0.6
  enable_search: false

app:
  memory_key: "chat_history"
  system_prompt: ""
  chroma_collection_name: "localRAG"
  chroma_persist_dir: "data/chroma_db"
  prompt_template_path: "prompt.txt"
  max_history_messages: 12
  max_history_chars: 2400
  max_single_message_chars: 400
  output_filter_enabled: true
  output_filter_review_enabled: true
  knowledge_allowed_extensions:
    - ".txt"
    - ".md"
    - ".pdf"
    - ".docx"
    - ".html"
    - ".htm"

db:
  path: "./data/chat_history.db"

redis:
  redis_host: 127.0.0.1
  redis_port: 6379
  redis_db: 0

jwt:
  secret_key: "change_me"
  algorithm: "HS256"
  access_token_expire_minutes: 30
